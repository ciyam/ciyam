<!DOCTYPE html>
<html>

<head>
   <meta charset="UTF-8">

   <meta http-equiv="Expires" content="0"/>
   <meta http-equiv="Pragma" content="no-cache"/>
   <meta http-equiv="Cache-Control" content="no-cache"/>
   <meta http-equiv="Cache-Control" content="no-store"/>

   <script type="text/javascript" src="sha2.js"></script>

   <title>Test Web Session</title>
</head>

<body onload="load( )">
   <a id="test_href" href=""><h1>Test Web Session</h1></a>

   <form id="test_form" onsubmit="do_fetch( ); return false;">
      <label>Key or PIN: &nbsp; <input type="text" id="user_access" size="30" placeholder="(e.g. admin)" autofocus></label>
      <br/><br/>
      <label for="user_droplist">Prior PINs: &nbsp;</label>
      <select id="user_droplist" name="user_droplist" onchange="select_access( )">
      <option value="" disabled selected>Select PIN</option>
      <option value="create">Create</option>
      </select>
      <br/>
      <div id="user_id_div">
      <br/>
      <label>Username: &nbsp <input type="text" id="user_name" size="30" maxlength="30"></label>
      </div>
      <div id="password_div">
      <br/>
      <label>Password: &nbsp;&nbsp; <input type="password" id="user_password" size="30"></label>
      <br/>
      </div>
      <br/>
      <label>Device: &nbsp;&nbsp;&nbsp; <input type="text" id="user_device" size="20" readonly></label>
      <br/><br/>
      <label>Session: &nbsp; <input type="text" id="user_session" size="25" readonly></label>
      <br/><br/>
      <label>Unique: &nbsp;&nbsp; <input type="text" id="user_unique" size="30" readonly></label>
      <br/><br/>
      <label>Request: &nbsp;&nbsp;&nbsp; <input type="text" id="user_request" size="100" placeholder="quit" onkeydown="return input_key( event )"></label>
      <br/><br/>
      <textarea id="user_arbitrary" name="user_arbitrary" rows="20" cols="125"></textarea>
      <br/><br/>
      <input type="checkbox" id="user_retain" name="user_retain" onclick="do_retain( )" >Retain Credentials
      <br/><br/>
      <input type="checkbox" id="user_remove" name="user_remove" onclick="do_remove( )" >Remove Credentials
      <br/><br/>
      <button type="submit">Click or Enter to Submit</button>
      <button type="button" id="reset_storage">Clear Local Storage and Reload</button>
   </form>

   <br/>

   <div id="data"></div>

   <script>
   var hashed = "";
   var page_style = "";

   var cws_device = "";

   var has_seed = false;

   var is_running = false;
   var is_admin_session = false;

   var self = 0;
   var owner = 0;

   const pin_length = 5;

   const own_name = "***";

   const help_name = "help";
   const quit_name = "quit";

   const exit_name = "exit";
   const finish_name = "finish";

   const admin_username = "admin";

   const admin_session_name = "[admin]";
   const standard_session_name = "[standard]";

   const creds_remove_help = "remove creds";
   const creds_retain_help = "retain creds";

   const stylesheets_reload_help = "reload stylesheet";

   const creds_delete_cmd = "creds|delete";
   const creds_remove_cmd = "creds|remove";
   const creds_retain_cmd = "creds|retain";

   const users_create_cmd = "users|create";
   const users_delete_cmd = "users|delete";
   const users_review_cmd = "users|review";

   const messages_create_cmd = "messages|create";
   const messages_review_cmd = "messages|review";

   const storages_attach_cmd = "storages|attach";
   const storages_review_cmd = "storages|review";

   const stylesheets_delete_cmd = "stylesheets|delete";
   const stylesheets_reload_cmd = "stylesheets|reload";
   const stylesheets_retain_cmd = "stylesheets|retain";
   const stylesheets_review_cmd = "stylesheets|review";

   const unlock_keys_create_cmd = "unlock-keys|create";
   const unlock_keys_employ_cmd = "unlock-keys|employ";

   const storage_modules_review_cmd = "storage-modules|review";
   const storage_instances_review_cmd = "storage-instances|review";

   const error_prefix = "Error: ";

   window.onfocus = function ( )
   {
      if( self )
         populate_access( );
   }

   const button_clear = document.getElementById( "reset_storage" );

   button_clear.onclick = function ( )
   {
      if( confirm( "Remove all local storage information?" ) )
      {
         localStorage.clear( );

         location.reload( true );
      }
   }

   const test_web_channel = new BroadcastChannel( "test_web_channel" );

   test_web_channel.addEventListener( "message", ( event ) =>
   {
      var data = event.data;

      console.log( "channel message ==> " + data );

      var pos = data.indexOf( ":" );

      if( pos >= 0 )
      {
         var target = data.substr( 0, pos );
         var viewer = data.substr( pos + 1 );

         var is_for_self = false;

         if( self == target )
         {
            is_for_self = true;
            target = "*** self ***";
         }

         console.log( "target = " + target );
         console.log( "viewer = " + viewer );

         if( is_for_self )
         {
            if( is_running )
            {
               test_web_channel.postMessage( viewer + "-" + self );

               var user_access = document.getElementById( "user_access" ).value;
               var user_device = document.getElementById( "user_device" ).value;
               var user_unique = document.getElementById( "user_unique" ).value;
               var user_session = document.getElementById( "user_session" ).value;

               if( user_session != "" )
                  test_web_channel.postMessage( viewer + "=" + user_access + ","
                   + user_device + "," + user_unique + "," + user_session + "," + hashed );
            }
         }
      }
      else
      {
         pos = data.indexOf( "-" );

         if( pos >= 0 )
         {
            var viewer = data.substr( 0, pos );
            var shared = data.substr( pos + 1 );

            if( self == viewer )
            {
               owner = shared;

               console.log( "owner = " + owner );

               var href_url = new URL( window.location.href );

               href_url.searchParams.set( "source", owner );

               document.getElementById( "test_href" ).href = href_url;
            }
         }
         else
         {
            pos = data.indexOf( "=" );

            if( pos >= 0 )
            {
               var viewer = data.substr( 0, pos );
               var shared = data.substr( pos + 1 );

               if( !is_running && ( ( self == viewer ) || ( owner == viewer ) ) )
               {
                  var user_data = shared.split( "," );

                  document.getElementById( "user_access" ).value = user_data[ 0 ];
                  document.getElementById( "user_device" ).value = user_data[ 1 ];
                  document.getElementById( "user_unique" ).value = user_data[ 2 ];
                  document.getElementById( "user_session" ).value = user_data[ 3 ];

                  document.getElementById( "user_password" ).value = "";

                  hashed = user_data[ 4 ];

                  document.getElementById( "user_access" ).disabled = true;
                  document.getElementById( "user_device" ).disabled = true;

                  document.getElementById( "user_request" ).disabled = false;

                  document.getElementById( "data" ).innerText = "";

                  document.getElementById( "user_request" ).focus( );
                  document.getElementById( "user_droplist" ).disabled = true;
                  document.getElementById( "reset_storage" ).disabled = true;

                  document.getElementById( "user_arbitrary" ).value = "(session linked)";
               }
            }
            else if( ( data == self ) || ( data == owner ) )
            {
               owner = 0;

               is_running = false;
               is_admin_session = false;

               document.getElementById( "user_access" ).value = "";
               document.getElementById( "user_password" ).value = "";

               document.getElementById( "user_unique" ).value = "";

               document.getElementById( "user_request" ).value = "";
               document.getElementById( "user_session" ).value = "";

               document.getElementById( "user_request" ).disabled = true;

               document.getElementById( "data" ).innerText = "";

               document.getElementById( "user_unique" ).focus( );
               document.getElementById( "user_droplist" ).disabled = false;
               document.getElementById( "reset_storage" ).disabled = false;

               document.getElementById( "user_arbitrary" ).value = "(session unlinked)";
            }
         }
      }
   } );

   function input_key( event )
   {
      // NOTE: Up arrow sets the value from the placeholder
      // (which acts as a "recall the last request" to then
      // be optionally edited for repeating).
      if( event.keyCode == 38 )
      {
         event.target.value = event.target.placeholder;

         return false;
      }
      else
         return true;
   }

   function encode_base64( str )
   {
      const bytes = new TextEncoder( ).encode( str );

      var binary = '';

      for( var i = 0; i < bytes.length; i++ )
         binary += String.fromCharCode( bytes[ i ] );

      return btoa( binary );
   }

   function encode_base64_url( str )
   {
      return encode_base64( str ).replace( /\+/g, "-" ).replace( /\//g, "_" ).replace( /=+$/, "" );
   }

   function word_length_compare( lhs, rhs )
   {
      var pos = lhs.indexOf( " " );

      if( pos > 0 )
         lhs = lhs.substring( 0, pos );

      pos = rhs.indexOf( " " );

      if( pos > 0 )
         rhs = rhs.substring( 0, pos );

      var retval = 0;

      if( lhs.length < rhs.length )
         retval = -1;
      else if( lhs.length > rhs.length )
         retval = 1;
      else
      {
         if( lhs < rhs )
            retval = -1;
         else if( lhs > rhs )
            retval = 1;
      }

      return retval;
   }

   function binary_search( array, item )
   {
      var left = 0;

      var right = array.length - 1;

      while( left <= right )
      {
         const mid = Math.floor( ( left + right ) / 2 );

         if( array[ mid ] == item )
            return true;
         else if( array[ mid ] < item )
            left = mid + 1;
         else
            right = mid - 1;
      }

      return false;
   }

   function harden_passwd( access, password )
   {
      return hex_sha256( access + password );
   }

   function select_access( )
   {
      var access = document.getElementById( "user_droplist" ).value;

      document.getElementById( "user_name" ).value = "";

      document.getElementById( "user_id_div" ).style.display = "none";
      document.getElementById( "password_div" ).style.display = "block";

      if( access == "create" )
      {
         hashed = "";

         document.getElementById( "user_access" ).value = "";
         document.getElementById( "user_device" ).value = "";

         document.getElementById( "user_retain" ).checked = false;
         document.getElementById( "user_retain" ).disabled = false;

         document.getElementById( "user_access" ).disabled = false;
         document.getElementById( "user_access" ).focus( );

         document.getElementById( "user_password" ).value = "";
      }
      else
      {
         document.getElementById( "user_access" ).value = access;

         var new_hashed = "";

         if( localStorage.getItem( "cws.hashed_" + access ) != null )
            new_hashed = localStorage.getItem( "cws.hashed_" + access );

         hashed = new_hashed;

         if( hashed == "" )
         {
            document.getElementById( "user_password" ).value = "";
            document.getElementById( "user_password" ).disabled = false;
         }
         else
         {
            document.getElementById( "user_password" ).value = "***";
            document.getElementById( "user_password" ).disabled = true;
         }

         document.getElementById( "user_device" ).value = cws_device;

         document.getElementById( "user_remove" ).disabled = false;

         document.getElementById( "user_retain" ).checked = true;
         document.getElementById( "user_retain" ).disabled = true;

         document.getElementById( "user_unique" ).focus( );
      }

      document.getElementById( "user_droplist" ).value = "";
   }

   function populate_access( )
   {
      var user_droplist = document.getElementById( "user_droplist" )

      var i, l = user_droplist.options.length - 1;

      for( i = l; i >= 2; i-- )
         user_droplist.remove( i );

      var access = document.getElementById( "user_access" ).value;

      var is_retained = false;

      if( localStorage.getItem( "cws.access" ) != null )
      {
         var access_array = localStorage.getItem( "cws.access" );

         var access_entries = access_array.split( "," );

         for( var i = 0, l = access_entries.length; i < l; i++ )
         {
            var option = access_entries[ i ];

            if( option == access )
               is_retained = true;

            user_droplist.options.add( new Option( option, option, false ) );
         }
      }

      if( is_retained )
      {
         document.getElementById( "user_remove" ).disabled = false;

         document.getElementById( "user_retain" ).checked = true;
         document.getElementById( "user_retain" ).disabled = true;
      }
      else
      {
         document.getElementById( "user_remove" ).disabled = true;

         document.getElementById( "user_retain" ).checked = false;
         document.getElementById( "user_retain" ).disabled = false;
      }
   }

   function load( )
   {
      self = Date.now( );

      if( sessionStorage.getItem( "self" ) != null )
         self = sessionStorage.getItem( "self" );
      else
         sessionStorage.setItem( "self", self );

      console.log( "self: " + self );

      document.getElementById( "user_id_div" ).style.display = "none";
      document.getElementById( "password_div" ).style.display = "block";

      var href_url = new URL( window.location.href );

      var source = href_url.searchParams.get( "source" );

      if( source != null )
      {
         console.log( "source: " + source );

         test_web_channel.postMessage( source + ':' + self );
      }

      href_url.searchParams.set( "source", self );

      document.getElementById( "test_href" ).href = href_url;

      if( localStorage.getItem( "cws.device" ) != null )
         cws_device = localStorage.getItem( "cws.device" );

      if( localStorage.getItem( "cws.access" ) != null )
      {
         var access_array = localStorage.getItem( "cws.access" );

         var access_entries = access_array.split( "," );

         var user_droplist = document.getElementById( "user_droplist" );

         var access = "";

         for( var i = 0, l = access_entries.length; i < l; i++ )
         {
            if( ( i == 0 ) && ( access_entries.length == 1 ) )
               access = access_entries[ i ];

            var option = access_entries[ i ];

            user_droplist.options.add( new Option( option, option, false ) );
         }

         document.getElementById( "user_access" ).value = access;

         document.getElementById( "user_access" ).disabled = true;

         if( access != "" )
         {
            document.getElementById( "user_device" ).value = cws_device;

            document.getElementById( "user_retain" ).checked = true;

            document.getElementById( "user_unique" ).focus( );

            if( localStorage.getItem( "cws.hashed_" + access ) != null )
            {
               hashed = localStorage.getItem( "cws.hashed_" + access );

               document.getElementById( "user_retain" ).checked = true;

               document.getElementById( "user_password" ).value = "***";
            }
         }
      }

      document.getElementById( "user_retain" ).disabled = true;

      if( document.getElementById( "user_access" ).value == "" )
      {
         document.getElementById( "user_device" ).value = "";

         document.getElementById( "user_remove" ).disabled = true;
         document.getElementById( "user_retain" ).disabled = true;
      }

      document.getElementById( "user_request" ).disabled = true;
      document.getElementById( "user_password" ).disabled = true;
   }

   function load_style( new_page_style, raw_style_information )
   {
      if( page_style != "" )
      {
         const old_link = document.getElementById( "css_main" );

         if( old_link != null )
            old_link.remove( );
      }

      if( raw_style_information != null )
      {
         var new_style = document.createElement( "style" );

         new_style.textContent = raw_style_information;

         new_style.setAttribute( "id", "css_main" );

         document.head.appendChild( new_style );
      }
      else
      {
         if( ( new_page_style != "null.css" )
          && ( new_page_style != "none.css" ) )
         {
            var new_link = document.createElement( "link" );

            new_link.rel = "stylesheet";

            // NOTE: A dummy "unique" query string is added so
            // the browser does not use a cached version (this
            // is still required despite the meta cache tags).
            new_link.href = new_page_style + "?" + Date.now( );

            new_link.setAttribute( "id", "css_main" );

            document.head.appendChild( new_link );
         }
      }

      page_style = new_page_style;
   }

   function reformatted( request )
   {
      var org = request;

      var parts = request.split( " " );

      if( parts.length > 1 )
      {
         var first = parts[ 0 ];
         var second = parts[ 1 ];

         var suffix = "";

         var pos = first.indexOf( '_' );

         if( pos < 0 )
         {
            if( ( first == "load" )
             || ( first == "reload" ) )
               suffix = "|reload";
            else if( ( first == "get" )
             || ( first == "list" )
             || ( first == "read" )
             || ( first == "view" )
             || ( first == "review" ) )
               suffix = "|review";
            else if( ( first == "new" )
             || ( first == "create" ) )
               suffix = "|create";
            else if( ( first == "access" )
             || ( first == "attach" ) )
               suffix = "|attach";
            else if( first == "employ" )
               suffix = "|employ";
            else if( ( first == "save" )
             || ( first == "store" )
             || ( first == "retain" ) )
               suffix = "|retain";
            else if( ( first == "del" )
             || ( first == "kill" )
             || ( first == "erase" )
             || ( first == "delete" )
             || ( first == "remove" )
             || ( first == "destroy" ) )
               suffix = "|delete";
         }

         if( suffix != "" )
         {
            if( ( second.length > 3 )
             && ( second.slice( -1 ) != "s" ) )
               second += "s";

            request = second + suffix;

            if( request == creds_delete_cmd )
               request = creds_remove_cmd;

            if( parts.length > 2 )
            {
               var tail = parts.slice( 2 );

               request += " " + tail.join( " " );
            }
         }
      }
      else if( ( request == exit_name )
       || ( request == finish_name ) )
         request = quit_name;

      if( org != request )
         console.log( "reformatted = '" + request + "'" );

      return request;
   }

   function do_local_request( request )
   {
      if( request == creds_retain_cmd )
         do_retain( true );
      else if( request.startsWith( creds_retain_cmd ) )
         do_retain( false );
      else if( request == creds_remove_cmd )
         do_remove( true );
      else if( request.startsWith( creds_remove_cmd ) )
         do_remove( request.substr( creds_remove_cmd.length + 1 ) );
      else if( request == stylesheets_reload_cmd )
         load_style( "dummy", document.getElementById( "user_arbitrary" ).value );
      else if( request.startsWith( stylesheets_reload_cmd ) )
      {
         var style = request.substr( stylesheets_reload_cmd.length + 1 );

         if( style == own_name )
            style = document.getElementById( "user_access" ).value;

         load_style( style + ".css" );
      }

      document.getElementById( "user_request" ).placeholder = document.getElementById( "user_request" ).value;
      document.getElementById( "user_request" ).value = "";
   }

   function do_fetch( )
   {
      var request = document.getElementById( "user_request" ).value;

      if( request != "" )
         console.log( "request = '" + request + "'" );

      request = reformatted( request );

      if( request.startsWith( creds_retain_cmd ) )
         do_local_request( request );
      else if( request.startsWith( creds_remove_cmd ) )
         do_local_request( request );
      else if( request.startsWith( stylesheets_reload_cmd ) )
         do_local_request( request );
      else
      {
         var url = window.location.protocol + '//' + window.location.host + "/cws"

         var cmd = request;

         var pos = request.indexOf( " " );

         if( pos > 0 )
            cmd = request.substring( 0, pos );

         var request_type = "GET";

         if( cmd == stylesheets_retain_cmd )
            request_type = "PUT";
         else if( ( cmd == "" ) || ( cmd == users_create_cmd )
          || ( cmd == messages_create_cmd ) || ( cmd == storages_attach_cmd )
          || ( cmd == unlock_keys_create_cmd ) || ( cmd == unlock_keys_employ_cmd ) )
            request_type = "POST";
         else if( ( cmd == users_delete_cmd ) || ( cmd == stylesheets_delete_cmd ) )
            request_type = "DELETE";

         var has_cmd_options = false;
         var has_name_suffix = false;

         var cmd_is_url_suffix = false;
         var cmd_needs_truncating = false;

         var need_to_include_payload = false;

         if( request == help_name )
            cmd_is_url_suffix = true;
         else if( ( request == users_review_cmd ) || ( cmd == unlock_keys_create_cmd )
          || ( request == stylesheets_delete_cmd ) || ( request == stylesheets_retain_cmd ) )
         {
            cmd_is_url_suffix = true;
            cmd_needs_truncating = true;

            if( request == stylesheets_retain_cmd )
               need_to_include_payload = true;
         }

         if( ( cmd == users_create_cmd ) || ( cmd == users_delete_cmd )
          || ( cmd == messages_create_cmd ) || ( cmd == messages_review_cmd )
          || ( cmd == storages_attach_cmd ) || ( cmd == storages_review_cmd )
          || ( cmd == unlock_keys_employ_cmd ) || ( cmd == stylesheets_review_cmd )
          || ( cmd == storage_modules_review_cmd ) || ( cmd == storage_instances_review_cmd ) )
         {
            if( ( cmd == users_create_cmd )
             || ( cmd == messages_create_cmd ) || ( cmd == messages_review_cmd ) )
               has_cmd_options = true;
            else
            {
               has_name_suffix = true;

               if( cmd == storage_instances_review_cmd )
                  has_cmd_options = true;
            }

            cmd_is_url_suffix = true;
            cmd_needs_truncating = true;
         }

         if( cmd_needs_truncating )
         {
            var tpos = cmd.indexOf( "|" );

            if( tpos > 0 )
               cmd = cmd.substring( 0, tpos );
         }

         var access = document.getElementById( "user_access" ).value;

         if( cmd_is_url_suffix )
         {
            var name = "";

            if( has_name_suffix && ( pos > 0 ) )
            {
               name = request.substring( pos + 1 );

               if( name == own_name )
                  name = access;

               pos = name.indexOf( " " );

               if( pos >= 0 )
               {
                  request = name.substring( pos + 1 );
                  name = name.substring( 0, pos );
               }
            }

            if( !has_cmd_options )
               request = "";
            else
            {
               var opos = request.indexOf( " " );

               if( opos > 0 )
                  request = request.substring( opos + 1 );
            }

            url += "/" + cmd;

            if( name != "" )
               url += "/" + name;
         }

         if( cmd == quit_name )
            request = "";

         var qry_data = "access=" + access;

         var device = document.getElementById( "user_device" ).value;

         if( ( device != "" ) && ( cws_device != "" ) )
            qry_data += "&device=" + cws_device;

         qry_data += "&format=text";

         var username = "";

         if( document.getElementById( "user_name" ).value != "" )
            username = document.getElementById( "user_name" ).value;

         var password = "";

         if( document.getElementById( "user_password" ).value != "" )
            password = document.getElementById( "user_password" ).value;

         var hardened = "";

         if( ( username == "" ) && ( password != "" ) )
            hardened = harden_passwd( access, password );
         else if( username != "" )
         {
            if( username == admin_username )
               hardened = harden_passwd( access, password );
            else
            {
               // NOTE: For testing purposes the password is
               // just the "username" so to make it easy for
               // this UI just copies the username across to
               // the "password" input.

               hardened = harden_passwd( access, username );

               document.getElementById( "user_password" ).value = username;
            }
         }

         var credentials = "";

         if( hardened != "" )
         {
            if( username != "" )
               credentials = username + ":";

            credentials += hardened;
         }

         if( device == "" )
         {
            request_type = "POST";

            url += "/devices";

            // NOTE: Credentials must be base64 encoded.
            if( credentials != "" )
               qry_data += "&passwd=" + encode_base64_url( credentials );
         }

         var arbitrary = "";

         if( document.getElementById( "user_arbitrary" ).value != "" )
            arbitrary = document.getElementById( "user_arbitrary" ).value;

         if( ( arbitrary != "" ) && need_to_include_payload )
            qry_data += "&payload=" + encodeURIComponent( arbitrary );

         if( request != "" )
         {
            if( has_cmd_options )
               qry_data += "&options=" + encodeURIComponent( request );
            else
               qry_data += "&request=" + encodeURIComponent( request );
         }

         if( ( device == "" ) && ( password != "" ) )
         {
            if( has_seed )
            {
               has_seed = false;

               document.getElementById( "user_request" ).value = "";
               document.getElementById( "user_request" ).disabled = true;
            }
         }
         else
         {
            var unique = document.getElementById( "user_unique" ).value;

            if( unique == "" )
            {
               if( device != "" )
               {
                  request_type = "POST";

                  url += "/sessions";
               }
            }
            else
            {
               var session = document.getElementById( "user_session" ).value;

               if( session == "" )
               {
                  if( hashed == "" )
                     hashed = hex_sha256( hex_sha256( harden_passwd( access, password ) ) + device );

                  var session = hex_sha256( hashed + unique ).substr( 0, 20 );

                  document.getElementById( "user_session" ).value = session;

                  document.getElementById( "user_request" ).disabled = false;
                  document.getElementById( "user_request" ).focus( );

                  document.getElementById( "user_password" ).value = "";
                  document.getElementById( "user_password" ).disabled = true;

                  document.getElementById( "reset_storage" ).disabled = true;
               }

               if( cmd != quit_name )
               {
                  if( cmd == "" )
                  {
                     url += "/status";

                     request_type = "GET";
                  }

                  qry_data += "&session=" + session;
               }
               else
               {
                  request_type = "DELETE";

                  url += "/sessions/" + session;
               }
            }
         }

         if( qry_data != "" )
            url += "?" + qry_data;

         console.log( request_type + " " + url );

         fetch( url, { method: request_type } )
         .then( response => response.text( ) )
         .then( data => handle_response( data ) )
         .catch( error => console.error( "Error fetching data: ", error ) );
      }
   }

   function do_retain( force_full )
   {
      var access = document.getElementById( "user_access" ).value;

      if( access != "" )
      {
         var scope = "partially";

         var access_array = localStorage.getItem( "cws.access" );

         if( access_array == null )
            localStorage.setItem( "cws.access", access );
         else
         {
            var access_entries = access_array.split( "," );

            if( !binary_search( access_entries, access ) )
            {
               access_entries.push( access );

               access_entries.sort( );

               localStorage.setItem( "cws.access", access_entries.join( "," ) );
            }

            // NOTE: In case was previously retained remove the 'hashed'
            // password value (so it will not remain when is 'partial').
            if( localStorage.getItem( "cws.hashed_" + access ) != null )
               localStorage.removeItem( "cws.hashed_" + access );
         }

         var device = document.getElementById( "user_device" ).value;

         if( device != "" )
         {
            if( localStorage.getItem( "cws.device" ) == null )
               localStorage.setItem( "cws.device", device );

            if( hashed != "" )
            {
               var check = force_full;

               if( check == null )
                  check = confirm( "User access information has now been stored.\nAlso retain the hashed password information?" );

               if( check )
               {
                  scope = "completely";

                  localStorage.setItem( "cws.hashed_" + access, hashed );
               }
            }
         }

         populate_access( );

         document.getElementById( "user_retain" ).disabled = true;
         document.getElementById( "user_remove" ).disabled = false;

         document.getElementById( "user_password" ).value = "";
         document.getElementById( "user_password" ).disabled = true;

         document.getElementById( "user_request" ).focus( );

         document.getElementById( "data" ).innerText = "(retained credentials " + scope + ")";
      }
   }

   function do_remove( force_full )
   {
      var error = "";

      var scope = "partially";

      var access = "";

      if( ( force_full != null ) && ( force_full != true ) )
      {
         var is_num = /^\d+$/.test( force_full );

         if( is_num && ( force_full.length == pin_length ) )
            access = force_full;
         else
            force_full = false;
      }

      if( access == "" )
         access = document.getElementById( "user_access" ).value;

      var removed_hash = false;

      if( localStorage.getItem( "cws.hashed_" + access ) != null )
      {
         removed_hash =  true;

         localStorage.removeItem( "cws.hashed_" + access );
      }

      var remove_prompt = "";

      if( !removed_hash )
         remove_prompt = "Remove all user access information?"
      else
         remove_prompt = "Hashed password has now been removed.\nAlso remove all user access information?";

      var check = force_full;

      if( check == null )
         check = confirm( remove_prompt );

      if( check )
      {
         scope = "completely";

         var original = localStorage.getItem( "cws.access" );

         if( localStorage.getItem( "cws.access" ) != null )
         {
            var access_array = localStorage.getItem( "cws.access" );

            var access_entries = access_array.split( "," );

            if( access == access_array )
               localStorage.removeItem( "cws.access" );
            else
            {
               var new_access_entries = access_entries.filter( ( item ) => item != access );

               localStorage.setItem( "cws.access", new_access_entries.join( "," ) );
            }
         }

         if( original == localStorage.getItem( "cws.access" ) )
            error = "Error: Unable to find credentials for '" + access + "'.";

         document.getElementById( "user_remove" ).disabled = true;

         document.getElementById( "user_retain" ).checked = false;
         document.getElementById( "user_retain" ).disabled = false;
      }

      populate_access( );

      document.getElementById( "user_password" ).value = "";

      document.getElementById( "user_remove" ).checked = false;

      document.getElementById( "user_request" ).focus( );

      if( error != "" )
         document.getElementById( "data" ).innerText = error;
      else
         document.getElementById( "data" ).innerText = "(removed credentials " + scope + " for " + access + ")";
   }

   function handle_error( error )
   {
      if( !error.startsWith( error_prefix ) )
         error = error_prefix + error;

      document.getElementById( "data" ).innerText = error;

      if( !is_running )
      {
         hashed = "";

         document.getElementById( "user_unique" ).value = "";
         document.getElementById( "user_session" ).value = "";

         document.getElementById( "user_request" ).disabled = true;

         document.getElementById( "user_droplist" ).disabled = false;
         document.getElementById( "reset_storage" ).disabled = false;

         document.getElementById( "user_unique" ).focus( );
      }

      document.getElementById( "user_request" ).value = "";
   }

   function handle_response( data )
   {
      var lines = data.split( "\n" );

      if( lines.length < 10 )
         console.log( data );
      else
      {
         var head = lines.slice( 0, 10 );

         console.log( head.join( "\n" ) );
         console.log( "... (+" + ( lines.length - 10 ) + " further lines)" );
      }

      // NOTE: Changes the placeholder to the request just issued (making it clear that a response was received).
      if( ( document.getElementById( "user_unique" ).value != "" )
       && ( document.getElementById( "user_request" ).value != "" ) )
         document.getElementById( "user_request" ).placeholder = document.getElementById( "user_request" ).value;

      if( data.startsWith( error_prefix ) )
         handle_error( data );
      else
      {
         document.getElementById( "data" ).innerText = "";

         if( document.getElementById( "user_device" ).value == "" )
         {
            var pos = data.indexOf( " " );

            // NOTE: If is a PIN then need to provide password hash.
            if( pos == pin_length )
            {
               var extra = "";

               has_seed = true;

               document.getElementById( "user_access" ).value = data.substr( 0, pos );

               document.getElementById( "user_access" ).disabled = true;
               document.getElementById( "user_password" ).disabled = false;

               var entropy = data.substr( pos + 1 );

               pos = entropy.indexOf( " " );

               if( pos > 0 )
               {
                  extra = entropy.substr( pos + 1 );
                  entropy = entropy.substr( 0, pos );
               }

               if( entropy == "@none" )
               {
                  document.getElementById( "user_id_div" ).style.display = "block";
                  document.getElementById( "password_div" ).style.display = "none";

                  document.getElementById( "user_name" ).value = extra;
                  document.getElementById( "user_name" ).focus( );
               }
               else
               {
                  document.getElementById( "user_name" ).value = admin_username;

                  if( entropy != admin_username )
                  {
                     document.getElementById( "user_request" ).disabled = false;
                     document.getElementById( "user_request" ).value = entropy;
                  }

                  document.getElementById( "user_password" ).focus( );
               }
            }
            else
            {
               if( cws_device == "" )
               {
                  cws_device = data;

                  if( localStorage.getItem( "cws.device" ) == null )
                     localStorage.setItem( "cws.device", cws_device );
               }

               document.getElementById( "user_device" ).value = cws_device;

               document.getElementById( "user_access" ).disabled = true;

               document.getElementById( "user_name" ).value = "";

               document.getElementById( "user_id_div" ).style.display = "none";
               document.getElementById( "password_div" ).style.display = "block";

               document.getElementById( "user_unique" ).focus( );
            }
         }
         else if( document.getElementById( "user_unique" ).value == "" )
         {
            if( data.indexOf( " " ) >= 0 )
               handle_error( "User does not appear to exist." );
            else
            {
               document.getElementById( "user_unique" ).value = data;

               document.getElementById( "user_access" ).disabled = true;
               document.getElementById( "user_device" ).disabled = true;

               document.getElementById( "user_droplist" ).disabled = true;

               if( hashed != "" )
                  document.getElementById( "user_session" ).focus( );
               else
               {
                  document.getElementById( "user_password" ).disabled = false;
                  document.getElementById( "user_password" ).focus( );
               }
            }
         }
         else
         {
            document.getElementById( "data" ).innerText = "";

            // NOTE: Add local commands to the help output.
            if( document.getElementById( "user_request" ).value == help_name )
            {
               var lines = data.split( "\n" );

               if( !is_admin_session )
                  lines.push( creds_remove_help );
               else
                  lines.push( creds_remove_help + " [<pin>]" );

               lines.push( creds_retain_help + " [partial]" );

               lines.push( stylesheets_reload_help + " [<name> or none]" );

               lines.sort( word_length_compare );

               data = lines.join( "\n" );
            }

            document.getElementById( "user_arbitrary" ).value = data;

            var prefix = data;

            var pos = data.indexOf( " " );

            if( pos > 0 )
               prefix = data.substring( 0, pos );

            if( !is_running
             && ( ( prefix == admin_session_name ) || ( prefix == standard_session_name ) ) )
            {
               is_running = true;

               if( prefix == admin_session_name )
                  is_admin_session = true;
               else
                  is_admin_session = false;

               var target = owner;

               if( target == 0 )
                  target = self;

               if( target != 0 )
               {
                  console.log( "target: " + target );

                  var user_access = document.getElementById( "user_access" ).value;
                  var user_device = document.getElementById( "user_device" ).value;
                  var user_unique = document.getElementById( "user_unique" ).value;
                  var user_session = document.getElementById( "user_session" ).value;

                  test_web_channel.postMessage( target + "=" + user_access + ","
                   + user_device + "," + user_unique + "," + user_session + "," + hashed );
               }

               document.getElementById( "user_request" ).disabled = false;
            }

            var request = document.getElementById( "user_request" ).value;

            if( ( request == quit_name )
             || ( request == exit_name )
             || ( request == finish_name ) )
            {
               var access = document.getElementById( "user_access" ).value;

               if( localStorage.getItem( "cws.hashed_" + access ) == null )
                  hashed = "";
               else
               {
                  document.getElementById( "user_password" ).value = "***";
                  document.getElementById( "user_password" ).disabled = true;
               }

               is_running = false;

               document.getElementById( "user_unique" ).value = "";
               document.getElementById( "user_unique" ).focus( );

               document.getElementById( "user_request" ).value = "";
               document.getElementById( "user_session" ).value = "";

               document.getElementById( "user_retain" ).disabled = true;

               document.getElementById( "user_request" ).disabled = true;

               document.getElementById( "user_droplist" ).disabled = false;
               document.getElementById( "reset_storage" ).disabled = false;

               var target = owner;

               if( target == 0 )
                  target = self;

               test_web_channel.postMessage( String( target ) );

               owner = 0;
            }
            else if( document.getElementById( "user_retain" ).checked == false )
               document.getElementById( "user_retain" ).disabled = false;
         }
      }

      if( document.getElementById( "user_session" ).value != "" )
         document.getElementById( "user_request" ).value = "";
   }
   </script>
