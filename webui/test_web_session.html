<!DOCTYPE html>
<html>

<head>
   <meta charset="UTF-8">

   <meta http-equiv="Expires" content="0"/>
   <meta http-equiv="Pragma" content="no-cache"/>
   <meta http-equiv="Cache-Control" content="no-cache"/>
   <meta http-equiv="Cache-Control" content="no-store"/>

   <script type="text/javascript" src="sha2.js"></script>

   <title>Test Web Session</title>
</head>

<body onload="load( )">
   <a id="test_href" href=""><h1>Test Web Session</h1></a>

   <form id="test_form" onsubmit="do_fetch( ); return false;">
      <label>Key or PIN: &nbsp; <input type="text" id="user_access" size="30" placeholder="(e.g. admin)" autofocus></label>
      <br/><br/>
      <label for="user_droplist">Prior PINs: &nbsp;</label>
      <select id="user_droplist" name="user_droplist" onchange="select_access( )">
      <option value="" disabled selected>Select PIN</option>
      <option value="create">Create</option>
      </select>
      <br/><br/>
      <label>Password: &nbsp;&nbsp; <input type="text" id="user_password" size="30"></label>
      <br/><br/>
      <label>Device: &nbsp;&nbsp;&nbsp; <input type="text" id="user_device" size="20" readonly></label>
      <br/><br/>
      <label>Session: &nbsp; <input type="text" id="user_session" size="20" readonly></label>
      <br/><br/>
      <label>Unique: &nbsp;&nbsp; <input type="text" id="user_unique" size="30" readonly></label>
      <br/><br/>
      <label>Request: &nbsp;&nbsp;&nbsp; <input type="text" id="user_request" size="60" placeholder="(e.g. quit)"></label>
      <br/><br/>
      <textarea id="user_arbitrary" name="user_arbitrary" rows="20" cols="80"></textarea>
      <br/><br/>
      <input type="checkbox" id="user_retain" name="user_retain" onclick="do_retain( )" >Retain Credentials
      <br/><br/>
      <input type="checkbox" id="user_remove" name="user_remove" onclick="do_remove( )" >Remove Credentials
      <br/><br/>
      <button type="submit">Click or Enter to Submit</button>
   </form>

   <br/>

   <div id="data"></div>

   <script>
   var hashed = "";
   var page_style = "";

   var cws_device = "";

   var has_seed = false;
   var is_running = false;

   var self = 0;
   var owner = 0;

   const style_load_name = "style_load";
   const style_save_name = "style_save";

   const style_load_prefix = style_load_name + " ";

   window.onfocus = function ( )
   {
      if( self )
      {
         populate_access( );

         document.getElementById( "data" ).innerText = "";
      }
   }

   const test_web_channel = new BroadcastChannel( "test_web_channel" );

   test_web_channel.addEventListener( "message", ( event ) =>
   {
      var data = event.data;

      console.log( "channel message ==> " + data );

      var pos = data.indexOf( ":" );

      if( pos >= 0 )
      {
         var target = data.substr( 0, pos );
         var viewer = data.substr( pos + 1 );

         var is_for_self = false;

         if( self == target )
         {
            is_for_self = true;
            target = "*** self ***";
         }

         console.log( "target = " + target );
         console.log( "viewer = " + viewer );

         if( is_for_self )
         {
            if( is_running )
            {
               test_web_channel.postMessage( viewer + "-" + self );

               var user_access = document.getElementById( "user_access" ).value;
               var user_device = document.getElementById( "user_device" ).value;
               var user_unique = document.getElementById( "user_unique" ).value;
               var user_session = document.getElementById( "user_session" ).value;

               if( user_session != "" )
                  test_web_channel.postMessage( viewer + "=" + user_access + ","
                   + user_device + "," + user_unique + "," + user_session + "," + hashed );
            }
         }
      }
      else
      {
         pos = data.indexOf( "-" );

         if( pos >= 0 )
         {
            var viewer = data.substr( 0, pos );
            var shared = data.substr( pos + 1 );

            if( self == viewer )
            {
               owner = shared;

               console.log( "owner = " + owner );

               var href_url = new URL( window.location.href );

               href_url.searchParams.set( "source", owner );

               document.getElementById( "test_href" ).href = href_url;
            }
         }
         else
         {
            pos = data.indexOf( "=" );

            if( pos >= 0 )
            {
               var viewer = data.substr( 0, pos );
               var shared = data.substr( pos + 1 );

               if( !is_running && ( ( self == viewer ) || ( owner == viewer ) ) )
               {
                  var user_data = shared.split( "," );

                  document.getElementById( "user_access" ).value = user_data[ 0 ];
                  document.getElementById( "user_device" ).value = user_data[ 1 ];
                  document.getElementById( "user_unique" ).value = user_data[ 2 ];
                  document.getElementById( "user_session" ).value = user_data[ 3 ];

                  document.getElementById( "user_password" ).value = "";

                  hashed = user_data[ 4 ];

                  document.getElementById( "user_access" ).disabled = true;
                  document.getElementById( "user_device" ).disabled = true;

                  document.getElementById( "user_request" ).disabled = false;

                  document.getElementById( "data" ).innerText = "";

                  document.getElementById( "user_request" ).focus( );
                  document.getElementById( "user_droplist" ).disabled = true;

                  document.getElementById( "user_arbitrary" ).value = "(session linked)";
               }
            }
            else if( ( data == self ) || ( data == owner ) )
            {
               owner = 0;

               is_running = false;

               document.getElementById( "user_access" ).value = "";
               document.getElementById( "user_password" ).value = "";

               document.getElementById( "user_unique" ).value = "";

               document.getElementById( "user_request" ).value = "";
               document.getElementById( "user_session" ).value = "";

               document.getElementById( "user_request" ).disabled = true;

               document.getElementById( "data" ).innerText = "";

               document.getElementById( "user_unique" ).focus( );
               document.getElementById( "user_droplist" ).disabled = false;

               document.getElementById( "user_arbitrary" ).value = "(session unlinked)";
            }
         }
      }
   } );

   function encode_base64( str )
   {
      const bytes = new TextEncoder( ).encode( str );

      var binary = '';

      for( var i = 0; i < bytes.length; i++ )
         binary += String.fromCharCode( bytes[ i ] );

      return btoa( binary );
   }

   function encode_base64_url( str )
   {
      return encode_base64( str ).replace( /\+/g, "-" ).replace( /\//g, "_" ).replace( /=+$/, "" );
   }

   function binary_search( array, item )
   {
      var left = 0;

      var right = array.length - 1;

      while( left <= right )
      {
         const mid = Math.floor( ( left + right ) / 2 );

         if( array[ mid ] == item )
            return true;
         else if( array[ mid ] < item )
            left = mid + 1;
         else
            right = mid - 1;
      }

      return false;
   }

   function select_access( )
   {
      var access = document.getElementById( "user_droplist" ).value;

      if( access == "create" )
      {
         hashed = "";

         document.getElementById( "user_access" ).value = "";
         document.getElementById( "user_device" ).value = "";

         document.getElementById( "user_retain" ).checked = false;
         document.getElementById( "user_retain" ).disabled = false;

         document.getElementById( "user_access" ).disabled = false;
         document.getElementById( "user_access" ).focus( );

         document.getElementById( "user_password" ).value = "";
      }
      else
      {
         document.getElementById( "user_access" ).value = access;

         var new_hashed = "";

         if( localStorage.getItem( "cws.hashed_" + access ) != null )
            new_hashed = localStorage.getItem( "cws.hashed_" + access );

         hashed = new_hashed;

         if( hashed == "" )
         {
            document.getElementById( "user_password" ).value = "";
            document.getElementById( "user_password" ).disabled = false;
         }
         else
         {
            document.getElementById( "user_password" ).value = "***";
            document.getElementById( "user_password" ).disabled = true;
         }

         document.getElementById( "user_device" ).value = cws_device;

         document.getElementById( "user_remove" ).disabled = false;

         document.getElementById( "user_retain" ).checked = true;
         document.getElementById( "user_retain" ).disabled = true;

         document.getElementById( "user_unique" ).focus( );
      }

      document.getElementById( "user_droplist" ).value = "";
   }

   function populate_access( )
   {
      var user_droplist = document.getElementById( "user_droplist" )

      var i, l = user_droplist.options.length - 1;

      for( i = l; i >= 2; i-- )
         user_droplist.remove( i );

      var access = document.getElementById( "user_access" ).value;

      var is_retained = false;

      if( localStorage.getItem( "cws.access" ) != null )
      {
         var access_array = localStorage.getItem( "cws.access" );

         var access_entries = access_array.split( "," );

         for( var i = 0, l = access_entries.length; i < l; i++ )
         {
            var option = access_entries[ i ];

            if( option == access )
               is_retained = true;

            user_droplist.options.add( new Option( option, option, false ) );
         }
      }

      if( is_retained )
      {
         document.getElementById( "user_remove" ).disabled = false;

         document.getElementById( "user_retain" ).checked = true;
         document.getElementById( "user_retain" ).disabled = true;
      }
      else
      {
         document.getElementById( "user_remove" ).disabled = true;

         document.getElementById( "user_retain" ).checked = false;
         document.getElementById( "user_retain" ).disabled = false;
      }
   }

   function load( )
   {
      self = Date.now( );

      if( sessionStorage.getItem( "self" ) != null )
         self = sessionStorage.getItem( "self" );
      else
         sessionStorage.setItem( "self", self );

      console.log( "self: " + self );

      var href_url = new URL( window.location.href );

      var source = href_url.searchParams.get( "source" );

      if( source != null )
      {
         console.log( "source: " + source );

         test_web_channel.postMessage( source + ':' + self );
      }

      href_url.searchParams.set( "source", self );

      document.getElementById( "test_href" ).href = href_url;

      if( localStorage.getItem( "cws.device" ) != null )
         cws_device = localStorage.getItem( "cws.device" );

      if( localStorage.getItem( "cws.access" ) != null )
      {
         var access_array = localStorage.getItem( "cws.access" );

         var access_entries = access_array.split( "," );

         var user_droplist = document.getElementById( "user_droplist" );

         var access = "";

         for( var i = 0, l = access_entries.length; i < l; i++ )
         {
            if( ( i == 0 ) && ( access_entries.length == 1 ) )
               access = access_entries[ i ];

            var option = access_entries[ i ];

            user_droplist.options.add( new Option( option, option, false ) );
         }

         document.getElementById( "user_access" ).value = access;

         document.getElementById( "user_access" ).disabled = true;

         if( access != "" )
         {
            document.getElementById( "user_retain" ).checked = true;

            document.getElementById( "user_device" ).focus( );

            if( localStorage.getItem( "cws.hashed_" + access ) != null )
            {
               hashed = localStorage.getItem( "cws.hashed_" + access );

               document.getElementById( "user_retain" ).checked = true;
            }
         }
      }

      document.getElementById( "user_retain" ).disabled = true;

      if( document.getElementById( "user_access" ).value == "" )
      {
         document.getElementById( "user_device" ).value = "";

         document.getElementById( "user_remove" ).disabled = true;
         document.getElementById( "user_retain" ).disabled = true;
      }

      document.getElementById( "user_request" ).disabled = true;
      document.getElementById( "user_password" ).disabled = true;
   }

   function load_style( new_page_style, raw_style_information )
   {
      if( page_style != "" )
      {
         const old_link = document.getElementById( "css_main" );

         if( old_link != null )
            old_link.remove( );
      }

      if( raw_style_information != null )
      {
         var new_style = document.createElement( "style" );

         new_style.textContent = raw_style_information;

         new_style.setAttribute( "id", "css_main" );

         document.head.appendChild( new_style );
      }
      else
      {
         if( ( new_page_style != "null.css" )
          && ( new_page_style != "none.css" ) )
         {
            var new_link = document.createElement( "link" );

            new_link.rel = "stylesheet";

            // NOTE: A dummy "unique" query string is added so
            // the browser does not use a cached version (this
            // is still required despite the meta cache tags).
            new_link.href = new_page_style + "?" + Date.now( );

            new_link.setAttribute( "id", "css_main" );

            document.head.appendChild( new_link );
         }
      }

      page_style = new_page_style;
   }

   function do_fetch( )
   {
      var request = document.getElementById( "user_request" ).value;

      if( request == style_load_name )
         load_style( "dummy", document.getElementById( "user_arbitrary" ).value );
      else if( request.startsWith( style_load_prefix ) )
      {
         var style = request.substr( style_load_prefix.length );

         if( style == "***" )
            style = document.getElementById( "user_access" ).value;

         load_style( style + ".css" );
      }
      else
      {
         var url = window.location.protocol + '//' + window.location.host + "/api.cws"

         var access = document.getElementById( "user_access" ).value;

         var qry_data = "access=" + access;

         var device = document.getElementById( "user_device" ).value;

         if( ( device != "" ) && ( cws_device != "" ) )
            qry_data += "&device=" + cws_device;

         qry_data += "&format=text";

         var password = "";

         if( document.getElementById( "user_password" ).value != "" )
            password = document.getElementById( "user_password" ).value;

         // NOTE: Uses Base64 URL encoding so is not plain text.
         // Although not intended to provided real security uses
         // this encoding (rather than just URI) to help prevent
         // simplistic "over the shoulder" type observation.
         if( ( device == "" ) && ( password != "" ) )
            qry_data += "&passwd=" + encode_base64_url( password );

         var arbitrary = "";

         if( document.getElementById( "user_arbitrary" ).value != "" )
            arbitrary = document.getElementById( "user_arbitrary" ).value;

         if( ( arbitrary != "" ) && ( request == style_save_name ) )
            qry_data += "&payload=" + encodeURIComponent( arbitrary );

         if( request != "" )
            qry_data += "&request=" + encodeURIComponent( request );

         if( ( device == "" ) && ( password != "" ) )
         {
            if( has_seed )
            {
               has_seed = false;

               document.getElementById( "user_request" ).value = "";
               document.getElementById( "user_request" ).disabled = true;
            }
         }
         else
         {
            var unique = document.getElementById( "user_unique" ).value;

            if( unique != "" )
            {
               var session = document.getElementById( "user_session" ).value;

               if( session == "" )
               {
                  if( hashed == "" )
                     hashed = hex_sha256( hex_sha256( password ) + device );

                  var session = hex_sha256( hashed + unique ).substr( 0, 10 );

                  document.getElementById( "user_session" ).value = session;

                  document.getElementById( "user_request" ).disabled = false;
                  document.getElementById( "user_request" ).focus( );

                  document.getElementById( "user_password" ).value = "";
                  document.getElementById( "user_password" ).disabled = true;
               }

               qry_data += "&session=" + session;
            }
         }

         if( qry_data != "" )
            url += "?" + qry_data;

         console.log( url );

         fetch( url )
         .then( response => response.text( ) )
         .then( data => handle_response( data ) )
         .catch( error => console.error( "Error fetching data: ", error ) );
      }
   }

   function do_retain( )
   {
      var access = document.getElementById( "user_access" ).value;

      if( access != "" )
      {
         var scope = "partially";

         var access_array = localStorage.getItem( "cws.access" );

         if( access_array == null )
            localStorage.setItem( "cws.access", access );
         else
         {
            var access_entries = access_array.split( "," );

            if( !binary_search( access_entries, access ) )
            {
               access_entries.push( access );

               access_entries.sort( );

               localStorage.setItem( "cws.access", access_entries.join( "," ) );
            }
         }

         var device = document.getElementById( "user_device" ).value;

         if( device != "" )
         {
            if( localStorage.getItem( "cws.device" ) == null )
               localStorage.setItem( "cws.device", device );

            if( hashed != "" )
            {
               var check = confirm( "User identity information has now been stored.\nAlso retain the hashed password information?" );

               if( check )
               {
                  scope = "completely";

                  localStorage.setItem( "cws.hashed_" + access, hashed );
               }
            }
         }

         populate_access( );

         document.getElementById( "user_retain" ).disabled = true;
         document.getElementById( "user_remove" ).disabled = false;

         document.getElementById( "user_password" ).value = "";
         document.getElementById( "user_password" ).disabled = true;

         document.getElementById( "user_request" ).focus( );

         document.getElementById( "data" ).innerText = "(retained credentials " + scope + ")";
      }
   }

   function do_remove( )
   {
      var scope = "partially";

      var access = document.getElementById( "user_access" ).value;

      var removed_hash = false;

      if( localStorage.getItem( "cws.hashed_" + access ) != null )
      {
         removed_hash =  true;

         localStorage.removeItem( "cws.hashed_" + access );
      }

      var remove_prompt = "";

      if( !removed_hash )
         remove_prompt = "Remove all user identity information?"
      else
         remove_prompt = "Hashed password has now been removed.\nAlso remove all user identity information?";

      var check = confirm( remove_prompt );

      if( check )
      {
         scope = "completely";

         if( localStorage.getItem( "cws.access" ) != null )
         {
            var access_array = localStorage.getItem( "cws.access" );

            var access_entries = access_array.split( "," );

            if( access_entries.length == 1 )
               localStorage.removeItem( "cws.access" );
            else
            {
               var new_access_entries = access_entries.filter( ( item ) => item != access );

               localStorage.setItem( "cws.access", new_access_entries.join( "," ) );
            }
         }

         document.getElementById( "user_remove" ).disabled = true;

         document.getElementById( "user_retain" ).checked = false;
         document.getElementById( "user_retain" ).disabled = false;
      }

      populate_access( );

      document.getElementById( "user_password" ).value = "";

      document.getElementById( "user_remove" ).checked = false;

      document.getElementById( "user_request" ).focus( );

      document.getElementById( "data" ).innerText = "(removed credentials " + scope + ")";
   }

   function handle_response( data )
   {
      console.log( data );

      if( data.startsWith( "Error: " ) )
      {
         document.getElementById( "data" ).innerText = data;

         if( !is_running )
         {
            hashed = "";

            document.getElementById( "user_unique" ).value = "";
            document.getElementById( "user_session" ).value = "";

            document.getElementById( "user_request" ).value = "";
            document.getElementById( "user_request" ).disabled = true;

            document.getElementById( "user_droplist" ).disabled = false;

            document.getElementById( "user_unique" ).focus( );
         }
      }
      else
      {
         document.getElementById( "data" ).innerText = "";

         if( document.getElementById( "user_device" ).value == "" )
         {
            var pos = data.indexOf( " " );

            // NOTE: If is a PIN then need to provide password hash.
            if( pos == 5 )
            {
               has_seed = true;

               document.getElementById( "user_access" ).value = data.substr( 0, pos );

               document.getElementById( "user_access" ).disabled = true;

               var entropy = data.substr( pos + 1 );

               if( entropy != "@none" )
               {
                  document.getElementById( "user_request" ).disabled = false;
                  document.getElementById( "user_request" ).value = entropy;
               }

               document.getElementById( "user_password" ).disabled = false;
               document.getElementById( "user_password" ).focus( );
            }
            else
            {
               if( cws_device == "" )
                  cws_device = data;

               document.getElementById( "user_device" ).value = cws_device;

               document.getElementById( "user_access" ).disabled = true;

               document.getElementById( "user_unique" ).focus( );
            }
         }
         else if( document.getElementById( "user_unique" ).value == "" )
         {
            document.getElementById( "user_unique" ).value = data;

            document.getElementById( "user_access" ).disabled = true;
            document.getElementById( "user_device" ).disabled = true;

            document.getElementById( "user_droplist" ).disabled = true;

            if( hashed != "" )
               document.getElementById( "user_session" ).focus( );
            else
            {
               document.getElementById( "user_password" ).disabled = false;
               document.getElementById( "user_password" ).focus( );
            }
         }
         else
         {
            document.getElementById( "data" ).innerText = "";
            document.getElementById( "user_arbitrary" ).value = data;

            if( ( data == "[running]" ) || ( data == "[running as admin]" ) )
            {
               is_running = true;

               var target = owner;

               if( target == 0 )
                  target = self;

               if( target != 0 )
               {
                  console.log( "target: " + target );

                  var user_access = document.getElementById( "user_access" ).value;
                  var user_device = document.getElementById( "user_device" ).value;
                  var user_unique = document.getElementById( "user_unique" ).value;
                  var user_session = document.getElementById( "user_session" ).value;

                  test_web_channel.postMessage( target + "=" + user_access + ","
                   + user_device + "," + user_unique + "," + user_session + "," + hashed );
               }

               document.getElementById( "user_request" ).disabled = false;
            }

            if( document.getElementById( "user_request" ).value == "quit" )
            {
               var access = document.getElementById( "user_access" ).value;

               if( localStorage.getItem( "cws.hashed_" + access ) == null )
                  hashed = "";
               else
               {
                  document.getElementById( "user_password" ).value = "***";
                  document.getElementById( "user_password" ).disabled = true;
               }

               is_running = false;

               document.getElementById( "user_unique" ).value = "";
               document.getElementById( "user_unique" ).focus( );

               document.getElementById( "user_request" ).value = "";
               document.getElementById( "user_session" ).value = "";

               document.getElementById( "user_retain" ).disabled = true;

               document.getElementById( "user_request" ).disabled = true;

               document.getElementById( "user_droplist" ).disabled = false;

               var target = owner;

               if( target == 0 )
                  target = self;

               test_web_channel.postMessage( String( target ) );

               owner = 0;
            }
            else if( document.getElementById( "user_retain" ).checked == false )
               document.getElementById( "user_retain" ).disabled = false;
         }
      }

      if( !has_seed )
         document.getElementById( "user_request" ).value = "";
   }
   </script>
</body>

</html>
