<!DOCTYPE html>
<html>

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <script type="text/javascript" src="sha2.js"></script>

   <title>Test Web Session</title>
</head>

<body onload="load( )">
   <h1>CWS API Tester</h1>

   <form id="test_form" onsubmit="do_fetch( ); return false;">
      <label>User: &nbsp; <input type="text" id="user_token" size="20" placeholder="(e.g. admin)" autofocus></label>
      <br/><br/>
      <label>Password: &nbsp; <input type="text" id="password" size="20" placeholder="(e.g. password)"></label>
      <br/><br/>
      <label>Device: &nbsp; <input type="text" id="user_device" size="20" readonly></label>
      <br/><br/>
      <label>Session: &nbsp; <input type="text" id="user_session" size="20" readonly></label>
      <br/><br/>
      <label>Unique: &nbsp; <input type="text" id="user_unique" size="40" readonly></label>
      <br/><br/>
      <button type="submit">Click or Enter to Submit</button>
   </form>

   <br/>

   <div id="data"></div>

   <script>
   var checked = "";

   function load( )
   {
      if( localStorage.getItem( "token" ) != null )
         document.getElementById( "user_token" ).value = localStorage.getItem( "token" );

      if( localStorage.getItem( "device" ) != null )
         document.getElementById( "user_device" ).value = localStorage.getItem( "device" );

      if( localStorage.getItem( "checked" ) != null )
         checked = localStorage.getItem( "checked" );
   }

   function do_fetch( event )
   {
      var request = "http://localhost:13031/api.cws";

      var token = document.getElementById( "user_token" ).value;

      var qry_data = "token=" + token;

      var device = document.getElementById( "user_device" ).value;

      if( ( device == "" ) && ( localStorage.getItem( "device" ) != null ) )
         device = localStorage.getItem( "device" );

      if( device != "" )
         qry_data += "&device=" + device;

      var password = hex_sha256( document.getElementById( "password" ).value );

      if( device == "" )
         qry_data += "&pwd_hash=" + password;
      else
      {
         var unique = document.getElementById( "user_unique" ).value;

         if( unique != "" )
         {
            var session = document.getElementById( "user_session" ).value;

            if( session == "" )
            {
               if( checked == "" )
                  checked = hex_sha256( password + device );

               var session = hex_sha256( checked + unique ).substr( 0, 10 );

               document.getElementById( "user_session" ).value = session;
            }

            qry_data += "&session=" + session;
         }
      }

      if( qry_data != "" )
         request += "?" + qry_data;

      fetch( request )
      .then( response => response.text( ) )
      .then( data => handle_response( data ) )
      .catch( error => console.error( "Error fetching data: ", error ) );
   }

   function handle_response( data )
   {
      if( data.charAt( data.length - 1 ) == "\n" )
         data = data.slice( 0, -1 );

      if( data.startsWith( "Error: " ) )
         document.getElementById( "data" ).innerText = data;
      else
      {
         if( localStorage.getItem( "token" ) == null )
            localStorage.setItem( "token", document.getElementById( "user_token" ).value );

         if( document.getElementById( "user_device" ).value == "" )
         {
            localStorage.setItem( "device", data );
            document.getElementById( "user_device" ).value = data;
         }
         else if( document.getElementById( "user_unique" ).value == "" )
            document.getElementById( "user_unique" ).value = data;
         else
         {
            if( ( checked != "" ) && ( localStorage.getItem( "checked" ) == null ) )
               localStorage.setItem( "checked", checked );

            document.getElementById( "data" ).innerText = data;
         }
      }
   }
   </script>
</body>

</html>
