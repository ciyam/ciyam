<!DOCTYPE html>
<html>

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <script type="text/javascript" src="sha2.js"></script>

   <title>Test Web Session</title>
</head>

<body onload="load( )">
   <h1>CWS API Tester</h1>

   <form id="test_form" onsubmit="do_fetch( ); return false;">
      <label>Username: &nbsp; <input type="text" id="user_access" size="20" placeholder="(e.g. admin)" autofocus></label>
      <br/><br/>
      <label>Unique: &nbsp; <input type="text" id="user_unique" size="40" readonly></label>
      <br/><br/>
      <label>Password: &nbsp; <input type="text" id="user_password" size="20"></label>
      <br/><br/>
      <label>Session: &nbsp; <input type="text" id="user_session" size="20" readonly></label>
      <br/><br/>
      <label>Command: &nbsp; <input type="text" id="user_command" size="100" placeholder="(e.g. terminate)"></label>
      <br/><br/>
      <label>Device: &nbsp; <input type="text" id="user_device" size="20" readonly></label>
      <br/><br/>
      <input type="checkbox" id="user_retain" name="user_retain" onclick="do_retain( )" >Retain Credentials
      <br/><br/>
      <input type="checkbox" id="user_remove" name="user_remove" onclick="do_remove( )" >Remove Credentials
      <br/><br/>
      <button type="submit">Click or Enter to Submit</button>
   </form>

   <br/>

   <div id="data"></div>

   <script>
   var hashed = "";

   function load( )
   {
      if( localStorage.getItem( "access" ) != null )
      {
         document.getElementById( "user_access" ).value = localStorage.getItem( "access" );

         document.getElementById( "user_access" ).disabled = true;

         document.getElementById( "user_retain" ).checked = true;
         document.getElementById( "user_device" ).focus( );
      }

      if( localStorage.getItem( "device" ) != null )
      {
         document.getElementById( "user_device" ).value = localStorage.getItem( "device" );

         document.getElementById( "user_device" ).disabled = true;

         document.getElementById( "user_retain" ).checked = true;
         document.getElementById( "user_unique" ).focus( );
      }

      if( localStorage.getItem( "hashed" ) != null )
      {
         hashed = localStorage.getItem( "hashed" );

         document.getElementById( "user_retain" ).checked = true;
      }

      document.getElementById( "user_retain" ).disabled = true;
      document.getElementById( "user_remove" ).disabled = true;

      document.getElementById( "user_command" ).disabled = true;
      document.getElementById( "user_password" ).disabled = true;
   }

   function do_fetch( )
   {
      var request = "http://localhost:13031/api.cws";

      var access = document.getElementById( "user_access" ).value;

      var qry_data = "access=" + access;

      var device = document.getElementById( "user_device" ).value;

      if( ( device == "" ) && ( localStorage.getItem( "device" ) != null ) )
         device = localStorage.getItem( "device" );

      if( device != "" )
         qry_data += "&device=" + device;

      var password = "";

      if( document.getElementById( "user_password" ).value != "" )
         password = document.getElementById( "user_password" ).value;

      if( ( device == "" ) && ( password != "" ) )
         qry_data += "&password=" + encodeURIComponent( password );
      else
      {
         var unique = document.getElementById( "user_unique" ).value;

         if( unique != "" )
         {
            var session = document.getElementById( "user_session" ).value;

            if( session == "" )
            {
               if( hashed == "" )
                  hashed = hex_sha256( hex_sha256( password ) + device );

               var session = hex_sha256( hashed + unique ).substr( 0, 10 );

               document.getElementById( "user_session" ).value = session;

               document.getElementById( "user_remove" ).disabled = false;

               document.getElementById( "user_command" ).disabled = false;
               document.getElementById( "user_command" ).focus( );

               document.getElementById( "user_password" ).value = "";
               document.getElementById( "user_password" ).disabled = true;
            }

            qry_data += "&session=" + session;
         }
      }

      var command = document.getElementById( "user_command" ).value;

      if( command != "" )
         qry_data += "&function=" + encodeURIComponent( command );

      if( qry_data != "" )
         request += "?" + qry_data + "&format=text";

      console.log( request );

      fetch( request )
      .then( response => response.text( ) )
      .then( data => handle_response( data ) )
      .catch( error => console.error( "Error fetching data: ", error ) );
   }

   function do_retain( )
   {
      var access = document.getElementById( "user_access" ).value;

      if( access != "" )
      {
         var scope = "partially";

         localStorage.setItem( "access", access );

         var device = document.getElementById( "user_device" ).value;

         if( device != "" )
         {
            localStorage.setItem( "device", device );

            if( hashed != "" )
            {
               var check = confirm( "User and device inforation stored.\nAlso retain the hashed password information?" );

               if( check )
               {
                  scope = "completely";

                  localStorage.setItem( "hashed", hashed );
               }
            }
         }

         document.getElementById( "user_retain" ).disabled = true;
         document.getElementById( "user_remove" ).disabled = false;

         document.getElementById( "user_password" ).value = "";
         document.getElementById( "user_password" ).disabled = true;

         document.getElementById( "user_command" ).focus( );

         document.getElementById( "data" ).innerText = "(retained credentials " + scope + ")";
      }
   }

   function do_remove( )
   {
      var scope = "partially";

      if( localStorage.getItem( "hashed" ) != null )
         localStorage.removeItem( "hashed" );

      var check = confirm( "Hashed password has now been removed.\nAlso remove user and device information?" );

      if( check )
      {
         scope = "completely";

         if( localStorage.getItem( "access" ) != null )
            localStorage.removeItem( "access" );

         if( localStorage.getItem( "device" ) != null )
            localStorage.removeItem( "device" );

         document.getElementById( "user_remove" ).disabled = true;

         document.getElementById( "user_retain" ).checked = false;
         document.getElementById( "user_retain" ).disabled = false;
      }

      document.getElementById( "user_remove" ).checked = false;

      document.getElementById( "user_command" ).focus( );

      document.getElementById( "data" ).innerText = "(removed credentials " + scope + ")";
   }

   function handle_response( data )
   {
      if( data.startsWith( "Error: " ) )
      {
         document.getElementById( "data" ).innerText = data;

         document.getElementById( "user_unique" ).value = "";
         document.getElementById( "user_session" ).value = "";
      }
      else
      {
         if( document.getElementById( "user_device" ).value == "" )
         {
            // NOTE: If is a PIN then need to provide password hash.
            if( data.length == 5 )
            {
               document.getElementById( "user_access" ).value = data;

               document.getElementById( "user_access" ).disabled = true;

               document.getElementById( "user_password" ).disabled = false;
               document.getElementById( "user_password" ).focus( );
            }
            else
            {
               document.getElementById( "user_device" ).value = data;

               document.getElementById( "user_access" ).disabled = true;

               document.getElementById( "user_unique" ).focus( );
            }
         }
         else if( document.getElementById( "user_unique" ).value == "" )
         {
            document.getElementById( "user_unique" ).value = data;

            document.getElementById( "user_access" ).disabled = true;
            document.getElementById( "user_device" ).disabled = true;

            if( localStorage.getItem( "hashed" ) != null )
               document.getElementById( "user_session" ).focus( );
            else
            {
               document.getElementById( "user_password" ).disabled = false;
               document.getElementById( "user_password" ).focus( );
            }
         }
         else
         {
            document.getElementById( "data" ).innerText = data;

            if( document.getElementById( "user_command" ).value == "terminate" )
            {
               document.getElementById( "user_unique" ).value = "";
               document.getElementById( "user_unique" ).focus( );

               document.getElementById( "user_command" ).value = "";
               document.getElementById( "user_session" ).value = "";

               document.getElementById( "user_retain" ).disabled = true;

               document.getElementById( "user_command" ).disabled = true;
            }
            else if( document.getElementById( "user_retain" ).checked == false )
               document.getElementById( "user_retain" ).disabled = false;
         }
      }

      document.getElementById( "user_command" ).value = "";
   }
   </script>
</body>

</html>
